<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aleix Renom — Navigation Prototype</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f9f8f6;
  --text: #0a0a0a;
  --muted: #888;
  --card-bg: #ffffff;
  --card-shadow: 0 2px 24px rgba(0,0,0,0.055);
  --card-shadow-hover: 0 14px 52px rgba(0,0,0,0.11);
  --hdr-bg: rgba(249,248,246,0.85);
  --icon-hover: rgba(0,0,0,0.05);
  --surface: rgba(0,0,0,0.04);
  --hairline: rgba(0,0,0,0.08);
}
html.dark {
  --bg: #0f0f0d;
  --text: #f0efe9;
  --muted: #555;
  --card-bg: rgba(255,255,255,0.04);
  --card-shadow: none;
  --card-shadow-hover: 0 14px 52px rgba(0,0,0,0.45);
  --hdr-bg: rgba(15,15,13,0.85);
  --icon-hover: rgba(255,255,255,0.07);
  --surface: rgba(255,255,255,0.06);
  --hairline: rgba(255,255,255,0.08);
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, sans-serif;
  height: 100%;
  transition: background .2s, color .2s;
}

/* ━━ HEADER ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
header {
  position: fixed; top: 0; left: 0; right: 0; height: 56px; z-index: 20;
  display: flex; align-items: center; gap: 12px; padding: 0 32px;
  background: var(--hdr-bg);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: .5px solid var(--hairline);
}
.avi {
  width: 32px; height: 32px; border-radius: 50%; overflow: hidden;
  flex-shrink: 0; background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; color: var(--muted);
}
.avi img { width: 100%; height: 100%; object-fit: cover; object-position: center 8%; display: block; }
.nm { font-size: 14px; font-weight: 600; letter-spacing: -.01em; white-space: nowrap; }
.h-sep { color: var(--muted); font-size: 12px; padding: 0 4px; user-select: none; }
.tl { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp { flex: 1; }
.h-icons { display: flex; align-items: center; gap: 2px; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 6px; border: none; background: transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: var(--muted); text-decoration: none;
  transition: background .15s, color .15s;
}
.icon-btn:hover { background: var(--icon-hover); color: var(--text); }
.i { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; display: block; }
.h-div { width: 1px; height: 16px; background: var(--hairline); margin: 0 4px; flex-shrink: 0; }

/* ━━ STAGE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.stage {
  position: fixed; top: 56px; left: 0; right: 0; bottom: 0;
  overflow: hidden;
}

/* ━━ SEPARATOR ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.sep {
  position: absolute; top: 0; bottom: 0; width: 40px; z-index: 10;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; cursor: pointer;
  background: var(--bg);
  transition: background .18s, opacity .28s;
  user-select: none;
}
.sep:hover { background: var(--surface); }
.sep.sep-r { right: 0; left: auto; border-left: .5px solid var(--hairline); border-right: none; }
.sep.sep-l { left: 0; right: auto; border-right: .5px solid var(--hairline); border-left: none; }
.sep-ico {
  width: 16px; height: 16px; stroke: var(--muted); fill: none;
  stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round;
  transition: stroke .18s, transform .18s;
}
.sep:hover .sep-ico { stroke: var(--text); transform: scale(1.15); }
.sep-lbl {
  writing-mode: vertical-rl; font-size: 10px; font-weight: 600;
  letter-spacing: .08em; text-transform: uppercase; color: var(--muted);
  transition: color .18s;
}
.sep:hover .sep-lbl { color: var(--text); }

/* ━━ TRACK ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.track {
  display: flex; width: 200%; height: 100%;
  transition: transform .48s cubic-bezier(.32,0,.16,1);
  will-change: transform;
}
.page { width: 50%; height: 100%; overflow-y: auto; flex-shrink: 0; }
.page-a { padding: 28px 56px 40px 32px; }
.page-p { padding: 28px 32px 40px 56px; }

/* ━━ GRIDS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.agrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; max-width: 860px; }
.pgrid { display: grid; grid-template-columns: 1fr; gap: 16px; max-width: 560px; }

/* ━━ CARDS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.card {
  background: var(--card-bg);
  border-radius: 16px;
  box-shadow: var(--card-shadow);
  cursor: pointer; position: relative; overflow: hidden;
  height: 184px;
  transition: transform .26s cubic-bezier(.34,1.38,.64,1), box-shadow .26s ease;
  user-select: none;
}
html.dark .card { box-shadow: inset 0 0 0 1px var(--hairline); }
html.dark .card:hover { box-shadow: inset 0 0 0 1px var(--hairline), var(--card-shadow-hover); }
.card:hover { transform: translateY(-5px); box-shadow: var(--card-shadow-hover); }
.card:active { transform: translateY(-2px) scale(.997); transition-duration: .1s; }
.card.tall { height: 260px; }
.card::before {
  content: ''; position: absolute; inset: 0;
  opacity: .065; color: var(--text); pointer-events: none;
  transition: opacity .26s;
}
.card:hover::before { opacity: .11; }
.pat-d::before { background: radial-gradient(circle, currentColor 1.5px, transparent 1.5px) 0 0/22px 22px; }
.pat-g::before {
  background:
    linear-gradient(currentColor 1px, transparent 1px) 0 0/20px 20px,
    linear-gradient(90deg, currentColor 1px, transparent 1px) 0 0/20px 20px;
}
.pat-l::before { background: repeating-linear-gradient(-45deg, currentColor 0, currentColor 1px, transparent 0, transparent 15px); }
.ccon {
  position: relative; z-index: 1;
  padding: 20px 24px 24px; height: 100%;
  display: flex; flex-direction: column; justify-content: flex-end;
}
.ctype { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
.ctitle { font-size: 21px; font-weight: 700; letter-spacing: -.025em; }
.cdesc { font-size: 13px; color: var(--muted); line-height: 1.55; margin-top: 10px; }

/* ━━ OVERLAY ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.ovl {
  position: fixed; inset: 0;
  background: var(--bg); z-index: 50;
  clip-path: inset(50% 50% 50% 50% round 16px);
  pointer-events: none; overflow: hidden;
  will-change: clip-path;
}
.ovl.open { pointer-events: all; }
.back {
  position: absolute; top: 18px; left: 24px;
  display: flex; align-items: center; gap: 6px;
  background: transparent; border: none; cursor: pointer;
  color: var(--muted); font: 500 13px/1 system-ui, sans-serif;
  padding: 8px 12px 8px 8px; border-radius: 8px;
  opacity: 0; transform: translateY(5px);
  transition: background .15s, color .15s; z-index: 2;
}
.back:hover { background: var(--icon-hover); color: var(--text); }
.ovl.vis .back { opacity: 1; transform: translateY(0); transition: opacity .22s .07s, transform .22s .07s, background .15s, color .15s; }
.dcon {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 72px 32px 48px;
  opacity: 0; transform: translateY(14px);
  transition: opacity .28s, transform .28s;
}
.ovl.vis .dcon { opacity: 1; transform: translateY(0); transition: opacity .32s .12s, transform .32s .12s; }
.det-tp { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.det-ti { font-size: 32px; font-weight: 700; letter-spacing: -.03em; margin-bottom: 32px; }

/* App frames */
.af { width: 100%; max-width: 400px; background: var(--card-bg); border-radius: 16px; overflow: hidden; }
html:not(.dark) .af { box-shadow: var(--card-shadow); }
html.dark .af { box-shadow: inset 0 0 0 1px var(--hairline); }
.qword { padding: 28px 24px 20px; text-align: center; border-bottom: 1px solid var(--hairline); }
.qfi { font-size: 22px; font-weight: 700; letter-spacing: -.02em; }
.qhint { font-size: 12px; color: var(--muted); margin-top: 5px; }
.qopts { display: grid; grid-template-columns: 1fr 1fr; gap: .5px; background: var(--hairline); }
.qopt { background: var(--card-bg); border: none; cursor: pointer; padding: 16px 10px; font: 500 13.5px/1.3 system-ui, sans-serif; color: var(--text); transition: background .12s; text-align: center; }
.qopt:hover { background: var(--surface); }
.dui { padding: 32px 24px 28px; display: flex; flex-direction: column; align-items: center; gap: 24px; }
.drow { display: flex; align-items: center; gap: 14px; }
.die { width: 64px; height: 64px; border-radius: 14px; background: var(--surface); border: 1px solid var(--hairline); display: flex; align-items: center; justify-content: center; font-size: 34px; line-height: 1; }
.dop { font-size: 24px; font-weight: 300; color: var(--muted); }
.dres { font-size: 28px; font-weight: 700; width: 52px; text-align: center; }
.rollb { background: var(--text); color: var(--bg); border: none; cursor: pointer; padding: 12px 32px; border-radius: 10px; font: 600 14px/1 system-ui, sans-serif; transition: opacity .15s; }
.rollb:hover { opacity: .82; }
.pinfo { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 20px; }
.pinfo-d { font-size: 15px; color: var(--muted); line-height: 1.7; text-align: center; }
.ptags { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.ptag { font-size: 11px; font-weight: 600; letter-spacing: .04em; padding: 5px 11px; border-radius: 6px; background: var(--surface); color: var(--muted); border: 1px solid var(--hairline); }

/* ━━ MOBILE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@media (max-width: 560px) {
  header { padding: 0 16px; height: 52px; }
  .stage { top: 52px; }
  .page-a, .page-p { padding: 20px 48px 32px 16px; }
  .page-p { padding: 20px 16px 32px 48px; }
  .agrid { grid-template-columns: 1fr; }
  .card { height: 160px; }
  .card.tall { height: 220px; }
  .sep { width: 36px; }
}
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────────── -->
<header>
  <div class="avi">AR</div>
  <div style="display:flex;align-items:center;min-width:0;overflow:hidden">
    <span class="nm">Aleix Renom</span>
    <span class="h-sep" aria-hidden="true">·</span>
    <span class="tl">[ one-liner placeholder ]</span>
  </div>
  <div class="sp"></div>
  <div class="h-icons">
    <a class="icon-btn" href="#" title="LinkedIn" aria-label="LinkedIn">
      <svg class="i" viewBox="0 0 24 24"><path d="M4 6a2 2 0 1 0 4 0 2 2 0 0 0-4 0"/><rect x="4" y="9" width="4" height="11" rx=".5"/><path d="M12 9h4v1.5a4 4 0 0 1 3-1.5c2.5 0 4 1.5 4 4.5V20h-4v-5.5c0-1.1-.4-2-1.5-2S16 13.4 16 14.5V20h-4z"/></svg>
    </a>
    <a class="icon-btn" href="#" title="Email" aria-label="Email">
      <svg class="i" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><polyline points="3,5 12,13 21,5"/></svg>
    </a>
    <a class="icon-btn" href="#" title="GitHub" aria-label="GitHub">
      <svg class="i" viewBox="0 0 24 24"><path d="M9 19c-4.3 1.4-4.3-2.5-6-3m12 5v-3.5c0-1 .1-1.4-.5-2 2.8-.3 5.5-1.4 5.5-6a4.6 4.6 0 0 0-1.3-3.2 4.2 4.2 0 0 0-.1-3.2s-1.1-.3-3.5 1.3a12.3 12.3 0 0 0-6.2 0C6.5 2.8 5.4 3.1 5.4 3.1a4.2 4.2 0 0 0-.1 3.2A4.6 4.6 0 0 0 4 9.5c0 4.6 2.7 5.7 5.5 6-.6.6-.6 1.2-.5 2V21"/></svg>
    </a>
    <div class="h-div"></div>
    <button class="icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
      <svg class="i" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>
    </button>
  </div>
</header>

<!-- ── Stage ──────────────────────────────────────────────────────────────── -->
<div class="stage" id="stage">

  <!-- Separator -->
  <div class="sep sep-r" id="sep" role="button" tabindex="0" aria-label="Go to Projects">
    <svg class="sep-ico" id="sep-ico" viewBox="0 0 24 24">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
    <span class="sep-lbl" id="sep-lbl">Projects</span>
  </div>

  <!-- Sliding track -->
  <div class="track" id="track">

    <!-- Apps page -->
    <div class="page page-a" id="page-a">
      <div class="agrid">
        <div class="card pat-d" data-id="quiz" tabindex="0" role="button" aria-label="Open Finnish Quiz">
          <div class="ccon">
            <div class="ctype">app</div>
            <div class="ctitle">Finnish Quiz</div>
          </div>
        </div>
        <div class="card pat-g" data-id="dice" tabindex="0" role="button" aria-label="Open Dice Math">
          <div class="ccon">
            <div class="ctype">app</div>
            <div class="ctitle">Dice Math</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Projects page -->
    <div class="page page-p" id="page-p">
      <div class="pgrid">
        <div class="card tall pat-l" data-id="chatbot" tabindex="0" role="button" aria-label="Open Chatbot project">
          <div class="ccon">
            <div class="ctype">project</div>
            <div class="ctitle">Chatbot</div>
            <div class="cdesc">Developed for CompanyName with a team of 8 multifunctional developers.</div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ── App / Project overlay ──────────────────────────────────────────────── -->
<div class="ovl" id="ovl" role="dialog" aria-modal="true">
  <button class="back" id="back-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Back
  </button>
  <div class="dcon" id="dcon"></div>
</div>

<script>
// ── Theme ─────────────────────────────────────────────────────────────────────
document.getElementById('theme-toggle').addEventListener('click', function() {
  document.documentElement.classList.toggle('dark');
});

// ── Content definitions ───────────────────────────────────────────────────────
var DICE_FACES = ['⚀','⚁','⚂','⚃','⚄','⚅'];

function rollDice() {
  var a = Math.floor(Math.random() * 6), b = Math.floor(Math.random() * 6);
  document.getElementById('d1').textContent = DICE_FACES[a];
  document.getElementById('d2').textContent = DICE_FACES[b];
  document.getElementById('dr').textContent = (a + 1) * (b + 1);
}

var CONTENT = {
  quiz: {
    t: 'app', n: 'Finnish Quiz',
    h: '<div class="af"><div class="qword"><div class="qfi">Hyvää huomenta</div><div class="qhint">What does this mean?</div></div><div class="qopts"><button class="qopt">Good morning</button><button class="qopt">Good night</button><button class="qopt">Thank you</button><button class="qopt">Goodbye</button></div></div>'
  },
  dice: {
    t: 'app', n: 'Dice Math',
    h: '<div class="af"><div class="dui"><div class="drow"><div class="die" id="d1">⚄</div><span class="dop">×</span><div class="die" id="d2">⚂</div><span class="dop">=</span><span class="dres" id="dr">?</span></div><button class="rollb" onclick="rollDice()">Roll dice</button></div></div>'
  },
  chatbot: {
    t: 'project', n: 'Chatbot',
    h: '<div class="pinfo"><div class="pinfo-d">Developed for CompanyName with a team of 8 multifunctional developers. Integrated NLP to handle customer queries, with seamless handoff to human agents.</div><div class="ptags"><span class="ptag">React</span><span class="ptag">TypeScript</span><span class="ptag">NLP</span><span class="ptag">Team of 8</span></div></div>'
  }
};

// ── Page navigation ───────────────────────────────────────────────────────────
var curPage = 0;
var track   = document.getElementById('track');
var sep     = document.getElementById('sep');
var sepLbl  = document.getElementById('sep-lbl');
var sepIco  = document.getElementById('sep-ico');

function navTo(idx) {
  if (idx === curPage) return;
  sep.style.opacity = '0';
  sep.style.pointerEvents = 'none';
  track.style.transform = idx === 0 ? 'translateX(0)' : 'translateX(-50%)';
  curPage = idx;
  setTimeout(function() {
    sep.classList.remove('sep-r', 'sep-l');
    if (curPage === 0) {
      sep.classList.add('sep-r');
      sepLbl.textContent = 'Projects';
      sep.setAttribute('aria-label', 'Go to Projects');
      sepIco.setAttribute('points', '9 18 15 12 9 6'); // chevron right
    } else {
      sep.classList.add('sep-l');
      sepLbl.textContent = 'Apps';
      sep.setAttribute('aria-label', 'Go to Apps');
      sepIco.setAttribute('points', '15 18 9 12 15 6'); // chevron left
    }
    sep.style.opacity = '1';
    sep.style.pointerEvents = 'all';
  }, 480);
}

sep.addEventListener('click', function() { navTo(1 - curPage); });
sep.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); navTo(1 - curPage); }
});

// ── Swipe (mobile) ────────────────────────────────────────────────────────────
var touchX = 0, touchY = 0;
var stage = document.getElementById('stage');
stage.addEventListener('touchstart', function(e) {
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
}, { passive: true });
stage.addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - touchX;
  var dy = e.changedTouches[0].clientY - touchY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
    if (dx < 0 && curPage === 0) navTo(1);
    if (dx > 0 && curPage === 1) navTo(0);
  }
}, { passive: true });

// ── Card open / close ─────────────────────────────────────────────────────────
var ovl     = document.getElementById('ovl');
var backBtn = document.getElementById('back-btn');
var dcon    = document.getElementById('dcon');
var saved   = null;
var timer   = null;

document.querySelectorAll('.card').forEach(function(card) {
  card.addEventListener('click', function() { openCard(card); });
  card.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openCard(card); }
  });
});

function openCard(card) {
  var cr = card.getBoundingClientRect();
  saved = { t: cr.top, r: window.innerWidth - cr.right, b: window.innerHeight - cr.bottom, l: cr.left };

  var c = CONTENT[card.dataset.id];
  dcon.innerHTML = '<div class="det-tp">' + c.t + '</div><div class="det-ti">' + c.n + '</div>' + c.h;

  ovl.style.transition = 'none';
  ovl.style.clipPath = 'inset(' + saved.t + 'px ' + saved.r + 'px ' + saved.b + 'px ' + saved.l + 'px round 16px)';
  ovl.classList.add('open');

  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      ovl.style.transition = 'clip-path .52s cubic-bezier(.32,0,.16,1)';
      ovl.style.clipPath = 'inset(0px 0px 0px 0px round 0px)';
    });
  });

  clearTimeout(timer);
  timer = setTimeout(function() { ovl.classList.add('vis'); }, 390);
  document.body.style.overflow = 'hidden';
}

function closeCard() {
  ovl.classList.remove('vis');
  setTimeout(function() {
    ovl.style.transition = 'clip-path .42s cubic-bezier(.32,0,.16,1)';
    ovl.style.clipPath = 'inset(' + saved.t + 'px ' + saved.r + 'px ' + saved.b + 'px ' + saved.l + 'px round 16px)';
    setTimeout(function() {
      ovl.classList.remove('open');
      ovl.style.clipPath = 'inset(50% 50% 50% 50% round 16px)';
      document.body.style.overflow = '';
    }, 425);
  }, 65);
}

backBtn.addEventListener('click', closeCard);
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && ovl.classList.contains('open')) closeCard();
});
</script>
</body>
</html>
