<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aleix Renom — Header</title>
    <style>
      .icon-svg {
        width: 17px;
        height: 17px;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.75;
        stroke-linecap: round;
        stroke-linejoin: round;
        display: block;
      }

      .identity {
        display: flex;
        align-items: center;
        gap: 0;
        min-width: 0;
        overflow: hidden;
      }
      .sep {
        padding: 0 6px;
        flex-shrink: 0;
      }
      .tagline {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      @media (max-width: 560px) {
        .identity {
          flex-direction: column;
          align-items: flex-start;
          gap: 1px;
        }
        .sep {
          display: none;
        }
        .tagline {
          font-size: 11px;
        }
        .name {
          font-size: 13px;
        }
        header {
          height: 62px;
        }
        .body-placeholder {
          height: 160px;
        }
      }
    </style>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f9f8f6;
        --text: #0a0a0a;
        --text-muted: #888;
        --icon-hover: rgba(0, 0, 0, 0.05);
        --header-bg: rgba(249, 248, 246, 0.75);
        --accent: #0a0a0a;
      }
      html.dark {
        --bg: #0f0f0d;
        --text: #f0efe9;
        --text-muted: #555;
        --icon-hover: rgba(255, 255, 255, 0.07);
        --header-bg: rgba(15, 15, 13, 0.75);
        --accent: #f0efe9;
      }

      html,
      body {
        background: var(--bg);
        color: var(--text);
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        transition:
          background 0.2s,
          color 0.2s;
        min-height: 100vh;
      }

      /* ── HEADER ── */
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 32px;
        height: 56px;
        position: sticky;
        top: 0;
        background: var(--header-bg);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        z-index: 10;
      }

      .photo {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        overflow: hidden;
        flex-shrink: 0;
      }
      .photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 8%;
      }

      .name {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--text);
        white-space: nowrap;
      }
      .sep {
        color: var(--text-muted);
        font-size: 12px;
        padding: 0 2px;
        user-select: none;
      }
      .tagline {
        font-size: 13px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .spacer {
        flex: 1;
      }

      .icons {
        display: flex;
        align-items: center;
        gap: 2px;
      }
      .icon-btn {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        border: none;
        background: transparent;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 17px;
        text-decoration: none;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .icon-btn:hover {
        background: var(--icon-hover);
        color: var(--text);
      }

      .divider {
        width: 1px;
        height: 16px;
        background: rgba(128, 128, 128, 0.2);
        margin: 0 4px;
        flex-shrink: 0;
      }

      /* ── PLACEHOLDER BODY ── */
      .body-placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 180px;
        color: var(--text-muted);
        font-size: 13px;
        letter-spacing: 0.04em;
      }
      .scroll-demo {
        padding: 32px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
      }
      .card {
        background: var(--bg);
        border-radius: 12px;
        box-shadow: 0 2px 16px rgba(0, 0, 0, 0.055);
        height: 140px;
      }
      html.dark .card {
        background: rgba(255, 255, 255, 0.04);
        box-shadow: none;
      }

      .identity {
        display: flex;
        align-items: center;
        gap: 0;
        min-width: 0;
        overflow: hidden;
      }
      .sep {
        padding: 0 6px;
        flex-shrink: 0;
      }
      .tagline {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      @media (max-width: 560px) {
        .identity {
          flex-direction: column;
          align-items: flex-start;
          gap: 1px;
        }
        .sep {
          display: none;
        }
        .tagline {
          font-size: 11px;
        }
        .name {
          font-size: 13px;
        }
        header {
          height: 62px;
        }
        .body-placeholder {
          height: 160px;
        }
      }
    </style>
  </head>
